{% extends 'core/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">Вхід</h3>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        {{ form.as_p }}
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Увійти</button>
                </form>
                <hr>
                <div class="text-center">
                    <p class="mb-0 text-muted">Ще не маєте акаунту?</p>
                    <a href="{% url 'signup' %}" class="btn btn-link">Створити новий акаунт</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
