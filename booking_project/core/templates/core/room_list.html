<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Список кімнат</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1 class="text-center mb-4">Доступні кімнати для бронювання</h1>
    <div class="row">
        {% for room in rooms %}
        <div class="col-md-4 mb-3">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">{{ room.name }}</h5>
                    <p class="card-text">Тип: {{ room.get_room_type_display }}</p>
                    <p><strong>Місткість:</strong> {{ room.capacity }} осіб</p>
                    <p><strong>Ціна:</strong> {{ room.price_per_day }} грн</p>
                    <a href="{% url 'book_room' %}" class="btn btn-primary">Забронювати</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
