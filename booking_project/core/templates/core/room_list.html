<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система бронювання</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Booking System</a>
            <span class="navbar-text text-white">
                Користувач: {{ user.username }}
            </span>
        </div>
    </nav>

    <div class="container">
        <h1 class="mb-4">Наші кімнати</h1>
        <div class="row">
            {% for room in rooms %}
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-primary">{{ room.name }}</h5>
                        <h6 class="card-subtitle mb-2 text-muted">{{ room.get_room_type_display }}</h6>
                        <p class="card-text">
                            <strong>Місткість:</strong> {{ room.capacity }} осіб<br>
                            <strong>Ціна:</strong> {{ room.price_per_day }} грн/доба
                        </p>
                        <a href="{% url 'book_room' %}" class="btn btn-outline-primary w-100">Забронювати</a>
                    </div>
                </div>
            </div>
            {% empty %}
            <p>Наразі кімнат немає. Додайте їх в адмінці.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
