{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>BookingSystem</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        /* Стиль для кнопки виходу, щоб вона виглядала як посилання або кнопка в меню */
        .logout-btn {
            background: rgba(255, 75, 43, 0.1);
            border: 1px solid #ff4b2b;
            color: #ff4b2b;
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
            font-family: inherit;
        }
        .logout-btn:hover {
            background: #ff4b2b;
            color: white;
            box-shadow: 0 0 10px rgba(255, 75, 43, 0.5);
        }
        nav {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 15px 5%;
            background: #1a1a1a;
        }
    </style>
</head>
<body style="background-color: #121212; color: white; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">

    <nav>
        <a href="{% url 'room_list' %}" style="color: #af40ff; text-decoration: none; font-weight: bold; font-size: 1.5em; margin-right: auto;">BookingSystem</a>
        
        <a href="{% url 'room_list' %}" style="color: white; text-decoration: none;">Головна</a>
        
        {% if user.is_authenticated %}
            <a href="{% url 'my_bookings' %}" style="color: white; text-decoration: none;">📂 Мої бронювання</a>
            <span style="color: #00ddeb;">Привіт, {{ user.username }}!</span>
            
            <form action="{% url 'logout' %}" method="post" style="display: inline;">
                {% csrf_token %}
                <button type="submit" class="logout-btn">Вийти</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}" style="color: white; text-decoration: none;">Увійти</a>
            <a href="{% url 'signup' %}" style="color: #af40ff; text-decoration: none;">Реєстрація</a>
        {% endif %}
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
